services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_COMPANY_NAME=DicoFlow
      - NEXT_PUBLIC_SITE_URL=https://www.dicoflow.com
      - ADMIN_API_KEY=${ADMIN_API_KEY:-changeme}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
    volumes:
      - enquiry_data:/app/.data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  enquiry_data:
